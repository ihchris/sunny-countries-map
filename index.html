<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Global Climate Index - Interactive Map</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
            display: ['Space Grotesk', 'Inter', 'sans-serif']
          }
        }
      }
    };
  </script>

  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div id="map"></div>

  <div class="ui-layer flex-col md:flex-row">
    
    <button id="toggleLeftBtn" class="float-toggle">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
      Show List
    </button>

    <button id="themeToggleBtn" class="absolute top-5 right-20 z-10 p-3 bg-white/80 hover:bg-white rounded-full text-slate-700 hover:text-amber-500 transition-all shadow-md backdrop-blur-md pointer-events-auto text-xl leading-none">
      🌙
    </button>

    <aside id="leftSidebar" class="glass-panel flex flex-col h-[45vh] md:h-full w-full md:w-[420px] flex-shrink-0 overflow-hidden relative">
      <button id="closeLeftBtn" class="absolute top-4 right-4 z-10 p-2 bg-white/50 hover:bg-white rounded-full text-slate-400 hover:text-slate-700 transition-all shadow-sm">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
      </button>

      <div class="p-5 border-b border-slate-200/60 flex-shrink-0 bg-white/40 pt-10 md:pt-5">
        <h1 class="display-font text-2xl font-bold text-slate-800 flex items-center gap-2 tracking-tight">
          <span class="text-3xl drop-shadow-sm">☀️</span> Climate Atlas
        </h1>
        
        <div class="mt-4 relative shadow-sm rounded-xl">
          <svg class="absolute left-3.5 top-1/2 -translate-y-1/2 h-4 w-4 text-slate-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"></circle><path d="m20 20-3.5-3.5"></path></svg>
          <input id="searchInput" type="search" placeholder="Search destinations..." class="w-full bg-white/70 border border-slate-200/80 rounded-xl pl-10 pr-4 py-2.5 text-sm text-slate-800 outline-none focus:border-amber-400 focus:bg-white focus:ring-2 focus:ring-amber-100 transition-all placeholder:text-slate-400" />
        </div>

        <div class="mt-4 grid grid-cols-2 gap-3">
          <div class="flex rounded-xl bg-slate-100/80 p-1 border border-slate-200/50">
            <button id="modeSunshine" class="metric-toggle flex-1 rounded-lg px-2 py-2 text-xs font-semibold transition-all bg-white shadow-sm text-amber-600">Sunshine</button>
            <button id="modeTemperature" class="metric-toggle flex-1 rounded-lg px-2 py-2 text-xs font-semibold transition-all text-slate-500 hover:text-slate-700">Temp</button>
          </div>
          <div class="flex rounded-xl bg-slate-100/80 p-1 border border-slate-200/50">
            <button id="unitC" class="unit-toggle flex-1 rounded-lg px-2 py-2 text-xs font-semibold transition-all bg-white shadow-sm text-sky-600">°Celsius</button>
            <button id="unitF" class="unit-toggle flex-1 rounded-lg px-2 py-2 text-xs font-semibold transition-all text-slate-500 hover:text-slate-700">°F</button>
          </div>
        </div>

        <div class="mt-4 flex gap-2 overflow-x-auto custom-scrollbar pb-2" id="regionFilters"></div>
        <div class="mt-2 text-[11px] font-semibold text-slate-400 flex justify-between uppercase tracking-wider">
          <span id="visibleCount">0 results</span>
        </div>
      </div>

      <div class="flex-1 overflow-y-auto custom-scrollbar p-3 bg-white/20" id="cardsGrid"></div>
    </aside>

    <aside id="rightSidebar" class="glass-panel w-full md:w-[340px] h-fit p-6 hidden md:block mt-auto md:mt-0 panel-hidden-right relative">
      <button id="closeRightBtn" class="absolute top-4 right-4 p-2 bg-white/50 hover:bg-white rounded-full text-slate-400 hover:text-slate-700 transition-all shadow-sm">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
      </button>

      <div class="flex justify-between items-start pr-8">
        <div>
          <p class="text-[10px] uppercase tracking-[0.2em] text-slate-400 font-bold">Selected Region</p>
          <h2 id="selectedName" class="display-font mt-1 text-3xl font-bold text-slate-800 tracking-tight">--</h2>
        </div>
        <div id="selectedFlag" class="text-4xl drop-shadow-md">🌍</div>
      </div>
      
      <p id="selectedMeta" class="mt-2 text-sm text-slate-500 font-medium">--</p>

      <div class="mt-6 grid grid-cols-2 gap-3">
        <div class="bg-white/60 border border-white rounded-2xl p-4 shadow-sm">
          <div class="text-[10px] uppercase tracking-widest text-slate-400 mb-1 font-bold">Temp Now</div>
          <div id="selectedCurrentTemp" class="display-font text-2xl font-bold text-amber-500">--</div>
        </div>
        <div class="bg-white/60 border border-white rounded-2xl p-4 shadow-sm">
          <div class="text-[10px] uppercase tracking-widest text-slate-400 mb-1 font-bold">Feels Like</div>
          <div id="selectedFeelsLike" class="display-font text-2xl font-bold text-amber-600">--</div>
        </div>
        <div class="bg-white/60 border border-white rounded-2xl p-4 shadow-sm">
          <div class="text-[10px] uppercase tracking-widest text-slate-400 mb-1 font-bold">Humidity</div>
          <div id="selectedHumidity" class="display-font text-2xl font-bold text-sky-500">--%</div>
        </div>
        <div class="bg-white/60 border border-white rounded-2xl p-4 shadow-sm">
          <div class="text-[10px] uppercase tracking-widest text-slate-400 mb-1 font-bold">Wind</div>
          <div id="selectedWind" class="display-font text-2xl font-bold text-emerald-500">--</div>
        </div>
      </div>

      <div class="mt-4 p-4 bg-sky-50/80 rounded-2xl border border-sky-100 text-sm leading-relaxed text-slate-700 shadow-inner" id="selectedWeatherText">
        Loading...
      </div>
    </aside>

  </div>

  <script src="countries.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script src="app.js"></script>
</body>
</html>
